{% if announcement_content is defined and announcement_content %}
    <div id="lumina-announcement"
         x-data="announcementBanner()"
         x-show="!dismissed"
         x-cloak
         data-announcement-id="{{ announcement_id }}"
         class="relative z-[60] bg-[var(--lumina-accent)] text-white text-center text-sm"
         role="status">
        <div class="mx-auto flex max-w-[90rem] items-center justify-center gap-4 px-4 py-2">
            <div class="flex-1 [&_a]:underline [&_a]:font-medium">{{ announcement_content }}</div>
            <button @click="dismiss()"
                    class="shrink-0 rounded p-0.5 text-white/80 hover:text-white hover:bg-white/10 transition-colors cursor-pointer"
                    aria-label="Dismiss announcement"
                    type="button">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>
{% endif %}
