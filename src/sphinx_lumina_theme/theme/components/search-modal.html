<div id="lumina-search-modal"
     x-data="searchModal()"
     x-show="open"
     x-cloak
     @keydown.escape.window="close()"
     @keydown.meta.k.window.prevent="toggle()"
     @keydown.ctrl.k.window.prevent="toggle()"
     class="fixed inset-0 z-[100]"
     role="dialog"
     aria-modal="true"
     aria-label="Search documentation">
    {# Backdrop #}
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="close()"></div>
    {# Modal #}
    <div class="relative mx-auto mt-[15vh] max-w-xl rounded-xl border border-[var(--lumina-border)] bg-[var(--lumina-bg)] shadow-2xl"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95">
        {# Search input #}
        <div class="flex items-center border-b border-[var(--lumina-border)] px-4">
            <svg class="h-5 w-5 text-[var(--lumina-text-muted)]"
                 fill="none"
                 stroke="currentColor"
                 viewBox="0 0 24 24"
                 aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="search"
                   x-ref="searchInput"
                   x-model="query"
                   @input.debounce.150ms="search()"
                   @keydown.arrow-down.prevent="moveDown()"
                   @keydown.arrow-up.prevent="moveUp()"
                   @keydown.enter.prevent="goToSelected()"
                   class="w-full border-0 bg-transparent px-3 py-4 text-[var(--lumina-text)] placeholder-[var(--lumina-text-muted)] outline-none"
                   placeholder="Search docs..."
                   autocomplete="off">
            <kbd class="rounded border border-[var(--lumina-border)] bg-[var(--lumina-bg-secondary)] px-1.5 py-0.5 text-xs text-[var(--lumina-text-muted)]">esc</kbd>
        </div>
        {# Results #}
        <div class="max-h-[60vh] overflow-y-auto p-2"
             aria-live="polite"
             role="status">
            <template x-if="!loaded">
                <p class="px-3 py-8 text-center text-sm text-[var(--lumina-text-muted)]">Loading search index...</p>
            </template>
            <template x-if="loaded && query.length > 0 && results.length === 0">
                <p class="px-3 py-8 text-center text-sm text-[var(--lumina-text-muted)]">No results found.</p>
            </template>
            <template x-if="error">
                <p class="px-3 py-8 text-center text-sm text-[var(--lumina-text-muted)]"
                   x-text="error"></p>
            </template>
            <template x-for="(result, index) in results" :key="result.url">
                <a :href="result.url"
                   class="flex flex-col gap-0.5 rounded-lg px-3 py-2.5 no-underline transition-colors"
                   :class="index === selectedIndex ? 'bg-[var(--lumina-accent-light)] text-[var(--lumina-accent)]' : 'hover:bg-[var(--lumina-bg-secondary)] text-[var(--lumina-text)]'"
                   @mouseenter="selectedIndex = index">
                    <div class="flex min-w-0 items-center justify-between gap-2">
                        <span class="truncate text-sm font-medium" x-text="result.title"></span>
                        <template x-if="result.section">
                            <span class="shrink-0 rounded px-1.5 py-0.5 text-[10px] font-semibold uppercase tracking-wide"
                                  :class="index === selectedIndex ? 'bg-[var(--lumina-accent)] text-white opacity-70' : 'bg-[var(--lumina-bg-secondary)] text-[var(--lumina-text-muted)]'"
                                  x-text="result.section"></span>
                        </template>
                    </div>
                    <span class="line-clamp-2 text-xs text-[var(--lumina-text-muted)]"
                          x-html="result.excerpt"></span>
                </a>
            </template>
            <template x-if="loaded && query.length === 0">
                <p class="px-3 py-8 text-center text-sm text-[var(--lumina-text-muted)]">Type to search...</p>
            </template>
        </div>
        {# Keyboard hints #}
        <div class="flex items-center gap-3 border-t border-[var(--lumina-border)] px-4 py-2.5 text-xs text-[var(--lumina-text-muted)]">
            <span class="flex items-center gap-1"><kbd class="rounded border border-[var(--lumina-border)] bg-[var(--lumina-bg-secondary)] px-1 py-0.5 font-mono text-[10px]">&uarr;&darr;</kbd> Navigate</span>
            <span class="flex items-center gap-1"><kbd class="rounded border border-[var(--lumina-border)] bg-[var(--lumina-bg-secondary)] px-1 py-0.5 font-mono text-[10px]">&crarr;</kbd> Open</span>
            <span class="flex items-center gap-1"><kbd class="rounded border border-[var(--lumina-border)] bg-[var(--lumina-bg-secondary)] px-1 py-0.5 font-mono text-[10px]">esc</kbd> Close</span>
        </div>
    </div>
</div>
