version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      github-actions-major:
        patterns:
          - "*"
        update-types:
          - major

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      npm-major:
        patterns:
          - "*"
        update-types:
          - major

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      pip-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      pip-major:
        patterns:
          - "*"
        update-types:
          - major
