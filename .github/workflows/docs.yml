name: Deploy Documentation

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm install
          uv sync --dev

      - name: Build assets
        run: pnpm run build

      - name: Build documentation
        run: uv run sphinx-build docs docs/_build/html

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch or create gh-pages branch
          git fetch origin gh-pages:gh-pages 2>/dev/null || true

          if git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git worktree add gh-pages-deploy gh-pages
          else
            git worktree add --detach gh-pages-deploy
            cd gh-pages-deploy
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            cd ..
          fi

          # Remove everything except pr-* preview directories
          cd gh-pages-deploy
          find . -maxdepth 1 \
            ! -name '.' \
            ! -name '.git' \
            ! -name 'pr-*' \
            -exec rm -rf {} +
          cd ..

          # Copy build output to root
          cp -r docs/_build/html/. gh-pages-deploy/

          # Ensure GitHub Pages skips Jekyll processing
          touch gh-pages-deploy/.nojekyll

          # Commit and push
          cd gh-pages-deploy
          git add .
          git diff --cached --quiet || {
            git commit -m "Deploy documentation from ${GITHUB_SHA::7}"
            git push origin gh-pages
          }
