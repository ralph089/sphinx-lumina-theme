name: Deploy Documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/sphinx_lumina_theme/theme/**'
      - 'src/sphinx_lumina_theme/_static_src/**'

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Build assets
        run: pnpm run build

      - name: Build documentation
        run: uv run sphinx-build docs docs/_build/html

      - uses: ./.github/actions/deploy-gh-pages
        with:
          source-dir: docs/_build/html
          commit-message: "Deploy documentation from ${GITHUB_SHA::7}"
