name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: djlint check
        run: uv run djlint src/sphinx_lumina_theme/theme/ --check

  test-structure:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
        sphinx: ["8", "9"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python }}

      - name: Override Sphinx version
        run: uv pip install "sphinx~=${{ matrix.sphinx }}.0"

      - name: Build assets
        run: pnpm run build

      - name: Run structure tests
        run: uv run pytest tests/ --ignore=tests/test_browser.py -v

  test-extensions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup

      - name: Build assets
        run: pnpm run build

      - name: Build docs with all extensions (warnings as errors)
        run: uv run sphinx-build docs docs/_build/html -W

      - name: Verify key output files
        run: |
          test -f docs/_build/html/index.html
          test -f docs/_build/html/getting-started/installation.html

      - name: Run extension tests
        run: uv run pytest tests/test_extensions.py -v

  test-browser:
    needs: test-structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium firefox webkit

      - name: Build assets
        run: pnpm run build

      - name: Run browser tests
        run: uv run pytest tests/test_browser.py -v --browser chromium --browser firefox --browser webkit
