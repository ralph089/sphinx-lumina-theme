name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Build assets
        run: pnpm run build

      - name: Build docs
        run: uv run sphinx-build docs docs/_build/html

      - uses: ./.github/actions/deploy-gh-pages
        with:
          source-dir: docs/_build/html
          target-dir: pr-${{ github.event.pull_request.number }}
          commit-message: "Deploy PR #${{ github.event.pull_request.number }} preview"

      - name: Comment on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const prNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- lumina-preview -->';
            const previewUrl = `https://${owner}.github.io/${repo}/pr-${prNumber}/`;
            const body = `${marker}\n📖 **Preview ready:** ${previewUrl}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Remove preview directory
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_DIR="pr-${PR_NUMBER}"
          if [ -d "$PR_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            rm -rf "$PR_DIR"
            git add .
            git commit -m "Clean up PR #${PR_NUMBER} preview"
            git push origin gh-pages
          fi
