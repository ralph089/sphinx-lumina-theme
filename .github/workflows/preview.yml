name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm install
          uv sync --dev

      - name: Build assets
        run: pnpm run build

      - name: Build docs
        run: uv run sphinx-build docs docs/_build/html

      - name: Deploy to gh-pages
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch or create gh-pages branch
          git fetch origin gh-pages:gh-pages 2>/dev/null || true

          if git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git worktree add gh-pages-deploy gh-pages
          else
            git worktree add --detach gh-pages-deploy
            cd gh-pages-deploy
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            cd ..
          fi

          # Copy build output
          PR_DIR="gh-pages-deploy/pr-${PR_NUMBER}"
          rm -rf "$PR_DIR"
          cp -r docs/_build/html "$PR_DIR"

          # Ensure GitHub Pages skips Jekyll processing
          touch gh-pages-deploy/.nojekyll

          # Commit and push
          cd gh-pages-deploy
          git add .
          git diff --cached --quiet || {
            git commit -m "Deploy PR #${PR_NUMBER} preview"
            git push origin gh-pages
          }

      - name: Comment on PR
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- lumina-preview -->';
            const previewUrl = `https://${owner}.github.io/${repo}/pr-${prNumber}/`;
            const body = `${marker}\n📖 **Preview ready:** ${previewUrl}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Remove preview directory
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_DIR="pr-${PR_NUMBER}"
          if [ -d "$PR_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            rm -rf "$PR_DIR"
            git add .
            git commit -m "Clean up PR #${PR_NUMBER} preview"
            git push origin gh-pages
          fi
